<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login WASend</title>
</head>
<body>

<h2>Login WASend</h2>

<form id="loginForm">
  <input type="text" id="wa" placeholder="Nomor WhatsApp (628xxxx)" required><br><br>
  <input type="password" id="password" placeholder="Password" required><br><br>
  <button type="submit">Login</button>
</form>

<p id="msg"></p>

<script>
const SCRIPT_URL = "PASTE_URL_GOOGLE_SCRIPT_BARU"; // ganti dengan URL Apps Script baru

document.getElementById("loginForm").addEventListener("submit", function(e){
  e.preventDefault();

  const data = {
    action: "login",
    wa: document.getElementById("wa").value.trim(),
    password: document.getElementById("password").value
  };

  fetch(SCRIPT_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data)
  })
  .then(res => res.json())
  .then(res => {
    if(res.status){
      localStorage.setItem("user_wa", document.getElementById("wa").value.trim());
      localStorage.setItem("user_status", res.status);
      localStorage.setItem("user_expired", res.expired);
      document.getElementById("msg").innerText = "Login sukses!";
      window.location.href = "dashboard.html";
    } else {
      document.getElementById("msg").innerText = "Login gagal";
    }
  })
  .catch(err => {
    document.getElementById("msg").innerText = "Terjadi kesalahan.";
  });
});
</script>

</body>
</html>
