<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin WASend</title>
</head>
<body>

<h2>Login Admin</h2>

<form id="emailForm">
  <input type="email" id="email" placeholder="Email Admin" required><br><br>
  <button type="submit">Kirim OTP</button>
</form>

<form id="otpForm" style="display:none;">
  <input type="text" id="otp" placeholder="Masukkan PIN 6 digit" required><br><br>
  <button type="submit">Verifikasi</button>
</form>

<p id="msg"></p>

<script>
const SCRIPT_URL = "PASTE_URL_GOOGLE_SCRIPT_BARU"; // ganti dengan URL Apps Script baru

document.getElementById("emailForm").addEventListener("submit", function(e){
  e.preventDefault();
  const email = document.getElementById("email").value.trim();
  fetch(SCRIPT_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ action:"sendAdminOTP", email })
  })
  .then(res=>res.text())
  .then(res=>{
    document.getElementById("msg").innerText=res;
    document.getElementById("emailForm").style.display="none";
    document.getElementById("otpForm").style.display="block";
  });
});

document.getElementById("otpForm").addEventListener("submit", function(e){
  e.preventDefault();
  const email = document.getElementById("email").value.trim();
  const otp = document.getElementById("otp").value.trim();
  fetch(SCRIPT_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ action:"verifyAdminOTP", email, otp })
  })
  .then(res=>res.text())
  .then(res=>{
    document.getElementById("msg").innerText=res;
    if(res.includes("sukses")){
      localStorage.setItem("admin_login", "true");
      window.location.href="admin-dashboard.html";
    }
  });
});
</script>

</body>
</html>
