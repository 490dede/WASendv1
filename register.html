<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Register WASend</title>
</head>
<body>

<h2>Register WASend</h2>

<form id="registerForm">
  <input type="text" id="wa" placeholder="Nomor WhatsApp (628xxxx)" required><br><br>
  <input type="email" id="email" placeholder="Email" required><br><br>
  <input type="password" id="password" placeholder="Buat Password" required><br><br>
  <button type="submit">Register</button>
</form>

<p id="msg"></p>

<script>
const SCRIPT_URL = "PASTE_URL_GOOGLE_SCRIPT_BARU"; // ganti dengan URL Apps Script baru

document.getElementById("registerForm").addEventListener("submit", function(e){
  e.preventDefault();

  const data = {
    action: "register",
    wa: document.getElementById("wa").value.trim(),
    email: document.getElementById("email").value.trim(),
    password: document.getElementById("password").value
  };

  fetch(SCRIPT_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data)
  })
  .then(res => res.text())
  .then(res => {
    document.getElementById("msg").innerText = res;
  })
  .catch(err => {
    document.getElementById("msg").innerText = "Terjadi kesalahan.";
  });
});
</script>

</body>
</html>
