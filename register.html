<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Register WASend</title>
</head>
<body>

<h2>Register WASend</h2>

<form id="registerForm">
  <input type="text" id="wa" placeholder="Nomor WhatsApp (628xxxx)" required><br><br>
  <input type="email" id="email" placeholder="Email" required><br><br>
  <input type="password" id="password" placeholder="Buat Password" required><br><br>
  <button type="submit">Register</button>
</form>

<p id="msg"></p>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxUAUMTlcfBwH8FHk2XegljPndNCU1dzJmNAFoCXoM4ejK2ckL1Ei6o_8y_DduMx1a-SA/exec";

document.getElementById("registerForm").addEventListener("submit", function(e){
  e.preventDefault();

  // Ambil value input
  const wa = document.getElementById("wa").value.trim();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;

  if(!wa || !email || !password){
    document.getElementById("msg").innerText = "Semua field harus diisi!";
    return;
  }

  const payload = {
    action: "register",
    wa: wa,
    email: email,
    password: password
  };

  fetch(SCRIPT_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload)
  })
  .then(res => res.text())
  .then(res => {
    document.getElementById("msg").innerText = res;
    // reset form jika sukses
    document.getElementById("registerForm").reset();
  })
  .catch(err => {
    console.error(err);
    document.getElementById("msg").innerText = "Terjadi kesalahan saat menghubungi server.";
  });
});
</script>

</body>
</html>
