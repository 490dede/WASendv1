<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Dashboard WASend</title>
</head>
<body>

<h2>Admin Dashboard</h2>

<p>Total Users: <span id="totalUsers">0</span></p>

<!-- Search & Filter -->
<input type="text" id="search" placeholder="Cari WA / Email / Last Payment">
<br><br>
<label>Filter Register Date:</label>
<input type="date" id="startDate">
<input type="date" id="endDate">
<button id="filterBtn">Filter</button>
<button id="clearFilterBtn">Clear Filter</button>
<br><br>

<div id="userList"></div>

<button id="logoutBtn">Logout Admin</button>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxUAUMTlcfBwH8FHk2XegljPndNCU1dzJmNAFoCXoM4ejK2ckL1Ei6o_8y_DduMx1a-SA/exec";

// Cek session admin
if(localStorage.getItem("admin_login") !== "true"){
    window.location.href="admin.html";
}

// Ambil user
function loadUsers(search="", start_date="", end_date=""){
    fetch(`${API_URL}?action=getUsers&search=${encodeURIComponent(search)}&start_date=${encodeURIComponent(start_date)}&end_date=${encodeURIComponent(end_date)}`)
    .then(res=>res.json())
    .then(data=>{
        const userList = document.getElementById("userList");
        userList.innerHTML = "";
        document.getElementById("totalUsers").innerText = data.total;

        data.users.forEach(user=>{
            const div = document.createElement("div");
            div.style.border="1px solid #000";
            div.style.margin="5px";
            div.style.padding="5px";
            div.innerHTML = `
                <p>WA: ${user.WA}</p>
                <p>Email: ${user.Email}</p>
                <p>Status: ${user.Status}</p>
                <p>Expired: ${user.Expired || "-"}</p>
                <button onclick="updateStatus('${user.WA}', 'active')">Activate</button>
                <button onclick="updateStatus('${user.WA}', 'suspend')">Suspend</button>
                <button onclick="extendUser('${user.WA}')">Perpanjang +30 hari</button>
                <button onclick="window.open('https://wa.me/${user.WA}', '_blank')">Hubungi User</button>
            `;
            userList.appendChild(div);
        });
    });
}

// Update status user
function updateStatus(wa, status){
    fetch(`${API_URL}?action=updateStatus&wa=${encodeURIComponent(wa)}&status=${encodeURIComponent(status)}`)
    .then(res=>res.json())
    .then(res=>{
        alert(res.msg);
        loadUsers(); // reload
    });
}

// Extend user
function extendUser(wa){
    const date = prompt("Masukkan Tanggal Pembaruan (YYYY-MM-DD)");
    if(!date) return;
    fetch(`${API_URL}?action=extendUser&wa=${encodeURIComponent(wa)}&payment_date=${encodeURIComponent(date)}`)
    .then(res=>res.json())
    .then(res=>{
        alert(res.msg);
        loadUsers(); // reload
    });
}

// Search & filter
document.getElementById("filterBtn").addEventListener("click", ()=>{
    const search = document.getElementById("search").value;
    const start = document.getElementById("startDate").value;
    const end = document.getElementById("endDate").value;
    loadUsers(search, start, end);
});

document.getElementById("clearFilterBtn").addEventListener("click", ()=>{
    document.getElementById("search").value="";
    document.getElementById("startDate").value="";
    document.getElementById("endDate").value="";
    loadUsers();
});

// Logout
document.getElementById("logoutBtn").addEventListener("click", ()=>{
    localStorage.removeItem("admin_login");
    window.location.href="admin.html";
});

// Load awal
loadUsers();
</script>

</body>
</html>
