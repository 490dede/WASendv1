<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Dashboard WASend</title>
</head>
<body>

<h2>Admin Dashboard</h2>

<p>Total User: <span id="totalUser">0</span></p>
<input type="date" id="startDate"> → <input type="date" id="endDate">
<button id="filterBtn">Filter</button>
<button id="clearFilter">Clear Filter</button>

<div id="userList"></div>
<button id="logout">Logout</button>

<script>
const SCRIPT_URL = "PASTE_URL_GOOGLE_SCRIPT_BARU"; // ganti URL Apps Script baru

function loadUsers(start="", end=""){
  fetch(SCRIPT_URL, {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({ action:"getUsers", start_date:start, end_date:end })
  })
  .then(res=>res.json())
  .then(data=>{
    const listDiv = document.getElementById("userList");
    listDiv.innerHTML = "";
    data.forEach(u=>{
      const div = document.createElement("div");
      div.innerHTML=`WA: ${u.wa} | Email: ${u.email} | Status: ${u.status} | Expired: ${u.expired} 
      <button onclick="updateStatus('${u.wa}','active')">ACTIVE</button>
      <button onclick="updateStatus('${u.wa}','suspend')">SUSPEND</button>`;
      listDiv.appendChild(div);
    });
    document.getElementById("totalUser").innerText = data.length;
  });
}

function updateStatus(wa, status){
  fetch(SCRIPT_URL,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({action:"updateStatus", wa, status})
  }).then(res=>res.text())
  .then(res=>{
    alert(res);
    loadUsers();
  });
}

document.getElementById("filterBtn").addEventListener("click", ()=>{
  const start=document.getElementById("startDate").value;
  const end=document.getElementById("endDate").value;
  loadUsers(start,end);
});

document.getElementById("clearFilter").addEventListener("click", ()=>{
  document.getElementById("startDate").value="";
  document.getElementById("endDate").value="";
  loadUsers();
});

document.getElementById("logout").addEventListener("click", ()=>{
  localStorage.removeItem("admin_login");
  window.location.href="admin.html";
});

// load all user awal
loadUsers();
</script>

</body>
</html>
